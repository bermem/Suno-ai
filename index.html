<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>STABLE v12 – AI Music Empire</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    input, select, button, textarea {
      width: 90%;
      max-width: 600px;
      margin: 10px 0;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #00ff88;
      cursor: pointer;
      font-weight: bold;
    }
    textarea {
      height: 400px;
      background: #111;
      color: #00ff88;
    }
  </style>
</head>
<body>

<h1>🔥 STABLE v12 – AI Music Empire</h1>

<input type="text" id="artist" placeholder="Enter Artist Name">

<select id="genre">
  <option>Pop</option>
  <option>RnB</option>
  <option>Indie</option>
  <option>EDM</option>
  <option>ลูกทุ่ง</option>
  <option>อีสานอินดี้</option>
</select>

<select id="mood">
  <option>Empower</option>
  <option>Sad</option>
  <option>Romantic</option>
  <option>Festival</option>
  <option>Chill</option>
</select>

<button onclick="generate()">🚀 Launch AI Music Empire</button>

<textarea id="result" readonly></textarea>

<script>
function detectMarket(name) {
  const thaiRegex = /[ก-๙]/;
  return thaiRegex.test(name) ? "Thailand" : "Global";
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const artist = document.getElementById("artist").value || "Unknown";
  const genre = document.getElementById("genre").value;
  const mood = document.getElementById("mood").value;

  const market = detectMarket(artist);
  const bpm = randomFrom([90, 100, 110, 120, 128]);

  const hookTH = ["รักเธอซ้ำ ๆ ไม่เคยพอ","คืนนี้หัวใจมันเรียกหา","ตกหลุมรักอีกแล้ว"];
  const hookINT = ["We run the night forever","Can’t stop falling again","Love hits harder tonight"];

  const hook = market === "Thailand" ? randomFrom(hookTH) : randomFrom(hookINT);

  const score = Math.floor(Math.random() * 15) + 85;

  document.getElementById("result").value =
`🔥 STABLE v12 – AI MUSIC EMPIRE

ARTIST: ${artist}
MARKET: ${market}
GENRE: ${genre}
MOOD: ${mood}
BPM: ${bpm}

🎯 HIT SCORE: ${score}%
📈 VIRAL POTENTIAL: ${score > 92 ? "High" : "Medium-High"}

🎟 TOUR FIT: ${genre === "EDM" ? "Festival Mainstage" : "Arena Tour"}
🏆 AWARD INDEX: ${score > 93 ? "Major Award Tier" : "Nomination Tier"}

----- TIKTOK HOOK -----
${hook}
${hook}

----- SONG CORE -----

[Verse]
${market === "Thailand" ? "หัวใจมันเต้นไม่เป็นจังหวะ เมื่อเธอเดินเข้ามา" : "Heartbeat racing out of time when you step into my light"}

[Chorus]
${hook}

🌍 EMPIRE STATUS: GLOBAL EXPANSION MODE ACTIVE`;
}
</script>

</body>
</html>
