<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Smart Analyzer v4</title>

<style>
body{
  font-family:Arial;
  background:#0f0f14;
  color:white;
  padding:20px;
}
input,select,button,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{
  background:#ff0077;
  color:white;
  font-weight:bold;
}
textarea{
  height:220px;
  background:#1b1b25;
  color:#00ffcc;
}
.section{
  margin-top:20px;
  background:#1a1a22;
  padding:15px;
  border-radius:12px;
}
</style>
</head>
<body>

<h1>🎵 Smart DNA Analyzer – PRO v4</h1>

<input id="reference" placeholder="Singer / Song Reference">
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<button onclick="generateSong()">Generate Smart DNA Song</button>

<div class="section">
<h3>Song Title</h3>
<textarea id="title"></textarea>
</div>

<div class="section">
<h3>Suno Production Prompt</h3>
<textarea id="style"></textarea>
</div>

<div class="section">
<h3>Full Lyrics</h3>
<textarea id="lyrics"></textarea>
</div>

<script>

function detectStyle(ref){
  ref = ref.toLowerCase();

  if(ref.includes("70") || ref.includes("disco") || ref.includes("bee"))
    return "70s Disco Groove";
  if(ref.includes("80") || ref.includes("synth"))
    return "80s Synth Pop";
  if(ref.includes("indie"))
    return "Indie Emotional";
  if(/[ก-๙]/.test(ref))
    return "Thai Modern Pop";

  return "Modern Pop Anthem";
}

function generateSong(){

  const ref = document.getElementById("reference").value || "Modern Pop";
  const gender = document.getElementById("gender").value;
  const styleDNA = detectStyle(ref);

  let title = "Neon Firelight";
  let verse1, verse2, chorus, bridge, pre;

  if(styleDNA === "Thai Modern Pop"){

    title = "แสงไฟในคืนยาว";

    verse1 =
`ท่ามกลางคืนที่วุ่นวาย
เสียงหัวใจยังดังอยู่
แม้โลกหมุนไปไกล
เรายังยืนตรงนี้`;

    verse2 =
`จากวันที่เคยอ่อนแรง
กลายเป็นแรงให้ก้าวเดิน
ทุกหยดน้ำตาที่ไหล
วันนี้กลายเป็นพลัง`;

    pre = `ยิ่งใกล้ยิ่งรู้ ว่าเราต้องไปต่อ`;

    chorus =
`${title}
เราจะไม่ยอมแพ้
${title}
แม้ความมืดจะโอบล้อม`;

    bridge =
`เมื่อทุกอย่างเงียบลง
เสียงหัวใจจะชัดเจน`;

  } else {

    verse1 =
`City lights are moving faster
Heartbeat in overdrive
Shadows dancing on the ceiling
Feel the rhythm come alive`;

    verse2 =
`Every fall became momentum
Every scar became design
Now the silence can't control us
We are crossing every line`;

    pre = `Feel the tension rising higher`;

    chorus =
`${title}
We ignite the darkest sky
${title}
We are born to amplify`;

    bridge =
`When the music drops to silence
We still hear it in our veins`;
  }

  const lyrics =
`[Intro – Style: ${styleDNA}]

[Verse 1]
${verse1}

[Pre-Chorus]
${pre}

[Chorus]
${chorus}

[Verse 2]
${verse2}

[Pre-Chorus]

[Chorus x2]
${chorus}

[Bridge – Dynamic Shift]
${bridge}

[Final Chorus – Big Lift]
${chorus}
(Extended harmonies fade out)`;

  const prompt =
`Singer/Song Reference: ${ref}
Detected DNA Style: ${styleDNA}
Vocal Gender: ${gender}

Length: 4–5 Minutes
Structure: Intro – V1 – Pre – Chorus – V2 – Pre – Chorus x2 – Bridge – Final Chorus

Production Direction:
• Genre-authentic groove
• Chorus lift expansion
• Layered harmonies
• Wide stereo field
• Commercial radio-ready mix
• Headphone & Speaker optimized`;

  document.getElementById("title").value = title;
  document.getElementById("style").value = prompt;
  document.getElementById("lyrics").value = lyrics;
}

</script>

</body>
</html>
