<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commercial Hit AI v5</title>

<style>
body{
  font-family:Arial;
  background:#0f0f14;
  color:white;
  padding:20px;
}
input,select,button,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{
  background:#ff0077;
  color:white;
  font-weight:bold;
}
textarea{
  height:230px;
  background:#1b1b25;
  color:#00ffcc;
}
.section{
  margin-top:20px;
  background:#1a1a22;
  padding:15px;
  border-radius:12px;
}
</style>
</head>
<body>

<h1>🎵 Commercial Hit AI – PRO v5</h1>

<input id="reference" placeholder="Singer / Song Reference">

<select id="market">
<option>T-Pop Mainstream</option>
<option>Thai Indie</option>
<option>Esan Indie</option>
<option>Lukkrung</option>
<option>Lukthung</option>
<option>GMM Commercial</option>
</select>

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<button onclick="generateSong()">Generate Thai Market Hit</button>

<div class="section">
<h3>Song Title</h3>
<textarea id="title"></textarea>
</div>

<div class="section">
<h3>Suno Production Prompt</h3>
<textarea id="style"></textarea>
</div>

<div class="section">
<h3>Full Lyrics (4-5 Min)</h3>
<textarea id="lyrics"></textarea>
</div>

<script>

function generateSong(){

  const ref = document.getElementById("reference").value || "Thai Pop";
  const market = document.getElementById("market").value;
  const gender = document.getElementById("gender").value;

  let title, verse1, verse2, chorus, bridge, pre;

  if(market === "Thai Indie"){
    title = "คืนที่เราเงียบงัน";
    verse1 = "เรานั่งฟังเสียงฝนตกเบาๆ\nในห้องที่ยังมีเงาเธอ";
    verse2 = "ทุกความทรงจำยังค้างอยู่\nในเพลงที่เราเคยฟัง";
    pre = "บางทีความรักก็เป็นแค่ช่วงเวลา";
    chorus = `${title}\nเรายังคิดถึงกันไหม\n${title}\nแม้วันนี้ไม่เหมือนเดิม`;
    bridge = "ถ้าหากวันนั้นเรากล้ากว่านี้";
  }

  else if(market === "Esan Indie"){
    title = "ฮักเจ้าบ่ลืม";
    verse1 = "คืนลมหนาวพัดมาอีกครั้ง\nหัวใจอ้ายยังคิดฮอด";
    verse2 = "แม่นว่าเจ้าสิไปไกล\nแต่อ้ายบ่เคยลืม";
    pre = "เสียงแคนยังดังในใจ";
    chorus = `${title}\nคำว่าฮักยังอยู่เสมอ\n${title}\nบ่มีวันจางหาย`;
    bridge = "ถึงสิเหงาแค่ใด ใจอ้ายยังมั่นคง";
  }

  else if(market === "Lukkrung"){
    title = "ใต้แสงจันทร์";
    verse1 = "ใต้แสงจันทร์อันนวลผ่อง\nสองเราครองคำสัญญา";
    verse2 = "แม้กาลเวลาจะผันผ่าน\nรักยังมั่นในดวงใจ";
    pre = "โอ้ความรักอันแสนหวาน";
    chorus = `${title}\nดั่งบทเพลงแห่งนิรันดร์\n${title}\nตราตรึงในวิญญาณ`;
    bridge = "ขอเพียงเธออยู่เคียงข้าง";
  }

  else if(market === "Lukthung"){
    title = "คิดฮอดบ้านเฮา";
    verse1 = "เสียงลมทุ่งพัดผ่านใจ\nคิดฮอดบ้านเฮาหลาย";
    verse2 = "จากบ้านมาทำงานไกล\nใจยังห่วงนา";
    pre = "เหงาแค่ไหนก็ต้องสู้";
    chorus = `${title}\nหัวใจยังอยู่บ้านนา\n${title}\nฝันไว้วันกลับมา`;
    bridge = "แม้เหนื่อยก็ยังยิ้มได้";
  }

  else if(market === "GMM Commercial"){
    title = "ไม่ยอมแพ้หัวใจ";
    verse1 = "แม้วันที่โลกไม่เป็นใจ\nฉันยังยืนอยู่ตรงนี้";
    verse2 = "ทุกความผิดหวังที่ผ่านมา\nสอนให้ฉันเข้มแข็ง";
    pre = "ไม่มีอะไรหยุดเราได้";
    chorus = `${title}\nเราจะไปให้ถึงฝัน\n${title}\nไม่ว่าวันไหน`;
    bridge = "แสงไฟกำลังส่องทาง";
  }

  else { // T-Pop
    title = "คืนนี้เราจะจำ";
    verse1 = "แสงไฟส่องประกายทั่วเมือง\nเสียงหัวใจเต้นแรง";
    verse2 = "ทุกวินาทีมีค่า\nเราจะไม่ปล่อยไป";
    pre = "ให้จังหวะพาเราไป";
    chorus = `${title}\nช่วงเวลาที่สวยงาม\n${title}\nไม่มีวันเลือนหาย`;
    bridge = "ปล่อยให้เสียงเพลงดังขึ้น";
  }

  const lyrics =
`[Intro]

[Verse 1]
${verse1}

[Pre-Chorus]
${pre}

[Chorus]
${chorus}

[Verse 2]
${verse2}

[Pre-Chorus]

[Chorus x2]
${chorus}

[Bridge]
${bridge}

[Final Chorus]
${chorus}
(Outro fade)`;

  const prompt =
`Singer/Song Reference: ${ref}
Target Market: ${market}
Vocal Gender: ${gender}

Length: 4–5 Minutes
Commercial Structure Optimized
Radio Friendly Hook
Streaming Platform Ready

Production:
• Strong memorable chorus
• Market-authentic instrumentation
• Clean vocal upfront
• Wide stereo imaging
• Commercial mastering loudness`;

  document.getElementById("title").value = title;
  document.getElementById("style").value = prompt;
  document.getElementById("lyrics").value = lyrics;
}

</script>

</body>
</html>
