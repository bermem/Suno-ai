<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Song Generator PRO v3</title>

<style>
body{
  font-family:Arial;
  background:#0f0f14;
  color:white;
  padding:20px;
}
input,select,button,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{
  background:#ff0077;
  color:white;
  color:white;
  font-weight:bold;
}
textarea{
  height:220px;
  background:#1b1b25;
  color:#00ffcc;
}
.section{
  margin-top:20px;
  background:#1a1a22;
  padding:15px;
  border-radius:12px;
}
</style>
</head>
<body>

<h1>🎵 DNA Adaptive Engine – PRO v3</h1>

<input id="reference" placeholder="Singer / Song Reference">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<select id="language">
<option>English</option>
<option>Thai</option>
</select>

<button onclick="generateSong()">Generate Adaptive Song (4-5 min)</button>

<div class="section">
<h3>Song Title</h3>
<textarea id="title"></textarea>
</div>

<div class="section">
<h3>Suno Production Prompt</h3>
<textarea id="style"></textarea>
</div>

<div class="section">
<h3>Full Lyrics</h3>
<textarea id="lyrics"></textarea>
</div>

<script>

function generateSong(){

  const ref = document.getElementById("reference").value || "Pop Reference";
  const gender = document.getElementById("gender").value;
  const lang = document.getElementById("language").value;

  let title, verse1, verse2, pre, chorus, bridge;

  if(lang === "Thai"){

    title = "คืนที่เสียงหัวใจชัดเจน";

    verse1 =
`ฉันเดินอยู่กลางเมืองที่ไม่หลับใหล
แสงไฟพาใจลอยไปไกล
ทุกความฝันยังคงส่องทาง
แม้คืนจะยาวเท่าไร`;

    verse2 =
`วันที่ใจเคยอ่อนล้า
กลายเป็นแรงให้ก้าวไป
จากความเงียบในหัวใจ
วันนี้มันดังเกินใคร`;

    pre =
`ยิ่งใกล้ยิ่งรู้สึก
ว่าชีวิตกำลังเปลี่ยนไป`;

    chorus =
`${title}
เรายังมีไฟในหัวใจ
${title}
ไม่ว่าโลกจะหมุนเท่าไร
จะยืนอยู่ตรงนี้ไม่ไปไหน`;

    bridge =
`แม้ความมืดจะโอบล้อม
เราจะไม่ยอมแพ้
เสียงหัวใจจะนำทาง
ไปสู่วันใหม่`;

  }else{

    title = "Heartbeat Revolution";

    verse1 =
`Walking through a restless skyline
Neon burning in my eyes
Every echo feels like destiny
Calling me to rise`;

    verse2 =
`Every scar became a lesson
Every fall became a spark
Now I'm stronger than the silence
Lighting up the dark`;

    pre =
`Every step is getting closer
Feel the fire inside`;

    chorus =
`${title}
We are rising through the flame
${title}
Nothing's ever gonna be the same
Higher, higher we ignite`;

    bridge =
`When the world goes quiet
And the lights fade low
Hear the echo of our undertow
We rise again`;

  }

  const fullLyrics =
`[Intro – 8 Bars]

[Verse 1]
${verse1}

[Pre-Chorus]
${pre}

[Chorus]
${chorus}

[Verse 2]
${verse2}

[Pre-Chorus]
${pre}

[Chorus x2]
${chorus}

[Bridge]
${bridge}

[Final Chorus – Big Lift]
${chorus}
(Adlibs & layered harmonies fade out)`;

  const stylePrompt =
`Singer/Song Reference: ${ref}
Vocal Gender: ${gender}
Language: ${lang}

Length Target: 4–5 Minutes
Structure:
Intro – V1 – Pre – Chorus – V2 – Pre – Chorus x2 – Bridge – Final Chorus

Production:
• Strong melodic hook
• Dynamic chorus lift
• Wide stereo imaging
• Layered harmonies
• Clean vocal upfront
• World-class commercial mix`;

  document.getElementById("title").value = title;
  document.getElementById("style").value = stylePrompt;
  document.getElementById("lyrics").value = fullLyrics;
}

</script>

</body>
</html>
